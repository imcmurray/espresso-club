<tr id="drink-{{ d.id }}" class="editing">
    {# No <form> here — HTML5 forbids <form> as a direct child of <tr> and
       browsers silently hoist it out of the table. Use hx-include on the
       Save button instead so HTMX collects every named input in this row
       at submit time. #}
    <td><input name="sort_order" type="number" value="{{ d.sort_order }}" required></td>
    <td><input name="emoji" value="{{ d.emoji }}" maxlength="4" class="emoji-input"></td>
    <td>
        <input name="name" value="{{ d.name }}" required>
        <br><small>{{ d.id }}</small>
    </td>
    <td><input name="price_usd" type="number" step="0.05" value="{{ d.price_usd }}" required></td>
    <td><input name="description" value="{{ d.description }}"></td>
    <td>
        <label class="toggle">
            <input type="checkbox" name="active" {% if d.active %}checked{% endif %}>
            <span></span>
        </label>
    </td>
    <td class="actions">
        <button type="button"
                hx-post="/admin/drinks/{{ d.id }}"
                hx-include="closest tr"
                hx-target="#drink-{{ d.id }}"
                hx-swap="outerHTML">Save</button>
        <button type="button"
                hx-get="/admin/drinks/{{ d.id }}"
                hx-target="#drink-{{ d.id }}"
                hx-swap="outerHTML">Cancel</button>
    </td>
</tr>
