# Espresso Club — Lightning stack + app
#
# Default (no profile): LNbits w/ FakeWallet + the espresso app. No real LN
# traffic — useful for dev and tests.
#
# Production: pass --profile phoenixd to add a real ACINQ Lightning node.
# LNbits switches to PhoenixdWallet automatically because the lnbits service
# detects the phoenixd-data volume's phoenix.conf file at startup.
#
# Usage:
#   docker compose up -d                          # dev: FakeWallet
#   docker compose --profile phoenixd up -d       # prod: Phoenixd
#
# All containers use apparmor=unconfined per LXC requirements (see /project/CLAUDE.md).

name: espresso-club

services:
  # -----------------------------------------------------------------------------
  # Phoenixd — ACINQ's headless Lightning daemon. Optional; gated by --profile
  # phoenixd. Self-custodial, automatic channel management. Real BTC lives here.
  # First boot generates a 12-word seed and prints it to logs ONCE — write it
  # down. The HTTP API password is auto-generated and stored in
  # /phoenix/.phoenix/phoenix.conf, which the lnbits service reads via a
  # read-only mount.
  # -----------------------------------------------------------------------------
  phoenixd:
    image: acinq/phoenixd:0.7.3
    container_name: espresso-phoenixd
    restart: unless-stopped
    profiles: ["phoenixd"]
    security_opt:
      - apparmor=unconfined
    ports:
      - "127.0.0.1:9740:9740"
    volumes:
      - phoenixd-data:/phoenix/.phoenix
    healthcheck:
      test: ["CMD-SHELL", "test -f /phoenix/.phoenix/phoenix.conf"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 30s

  # -----------------------------------------------------------------------------
  # LNbits — multi-user Lightning wallet system. Each staff member gets a
  # sub-wallet. v1.5.4 is the official lnbits/lnbits image (the older
  # lnbitsdocker/lnbits-legend stops at 0.11 and lacks PhoenixdWallet).
  #
  # The command override on first boot:
  #  1) generates a SUPER_USER UUID into /data/.super_user (idempotent).
  #  2) if /phoenixd-data/phoenix.conf is present (phoenixd profile is up),
  #     reads the API password and switches funding source to PhoenixdWallet.
  #  3) otherwise stays on whatever LNBITS_BACKEND_WALLET_CLASS is set to
  #     (default FakeWallet, fine for dev and tests).
  # -----------------------------------------------------------------------------
  lnbits:
    image: lnbits/lnbits:v1.5.4
    container_name: espresso-lnbits
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
    ports:
      - "5000:5000"
    environment:
      LNBITS_HOST: 0.0.0.0
      LNBITS_PORT: 5000
      LNBITS_DATA_FOLDER: /data
      LNBITS_ADMIN_UI: "true"
      LNBITS_SITE_TITLE: "Espresso Club"
      LNBITS_SITE_TAGLINE: "fair coffee, fast settlement"
      LNBITS_BACKEND_WALLET_CLASS: ${LNBITS_BACKEND_WALLET_CLASS:-FakeWallet}
      PHOENIXD_API_ENDPOINT: ${PHOENIXD_API_ENDPOINT:-http://phoenixd:9740/}
      # Allow login cookies over plain HTTP (default LNbits setting forces
      # Secure flag, which browsers silently drop on http:// hosts). Auth
      # settings have no LNBITS_ prefix — env name is just AUTH_HTTPS_ONLY.
      AUTH_HTTPS_ONLY: ${AUTH_HTTPS_ONLY:-false}
    volumes:
      - lnbits-data:/data
      - phoenixd-data:/phoenixd-data:ro   # for password discovery; tolerated if empty
    command:
      - sh
      - -c
      - |
        set -eu
        if [ ! -f /data/.super_user ]; then
          cat /proc/sys/kernel/random/uuid | tr -d - > /data/.super_user
          echo "[lnbits-bootstrap] generated SUPER_USER: $$(cat /data/.super_user)"
        fi
        export SUPER_USER="$$(cat /data/.super_user)"
        # If the operator asked for PhoenixdWallet, wait for the phoenixd
        # service to write phoenix.conf — there's a brief race window even
        # with depends_on: service_healthy. Otherwise fall through to
        # whatever LNBITS_BACKEND_WALLET_CLASS is set to (FakeWallet by default).
        if [ "$${LNBITS_BACKEND_WALLET_CLASS:-FakeWallet}" = "PhoenixdWallet" ]; then
          for i in $$(seq 1 60); do
            [ -f /phoenixd-data/phoenix.conf ] && break
            echo "[lnbits-bootstrap] waiting for phoenix.conf... ($$i/60)"
            sleep 1
          done
          if [ ! -f /phoenixd-data/phoenix.conf ]; then
            echo "[lnbits-bootstrap] FATAL: phoenix.conf never appeared"
            exit 1
          fi
          export PHOENIXD_API_PASSWORD="$$(grep '^http-password=' /phoenixd-data/phoenix.conf | cut -d= -f2)"
          echo "[lnbits-bootstrap] PhoenixdWallet (api=$${PHOENIXD_API_ENDPOINT})"
        elif [ -f /phoenixd-data/phoenix.conf ]; then
          # Volume mounted and phoenixd already up — opportunistically use it
          # even if env didn't request it.
          export LNBITS_BACKEND_WALLET_CLASS=PhoenixdWallet
          export PHOENIXD_API_PASSWORD="$$(grep '^http-password=' /phoenixd-data/phoenix.conf | cut -d= -f2)"
          echo "[lnbits-bootstrap] auto-detected Phoenixd, using PhoenixdWallet"
        else
          echo "[lnbits-bootstrap] using $${LNBITS_BACKEND_WALLET_CLASS:-FakeWallet}"
        fi
        exec uv --offline run lnbits --port "$${LNBITS_PORT:-5000}" --host "$${LNBITS_HOST:-0.0.0.0}" --forwarded-allow-ips='*'
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/api/v1/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # -----------------------------------------------------------------------------
  # LNbits init — completes first-install wizard + installs User Manager
  # extension via API, idempotently. Runs after lnbits is healthy, exits 0.
  # -----------------------------------------------------------------------------
  lnbits-init:
    image: python:3.12-slim
    container_name: espresso-lnbits-init
    restart: "no"
    security_opt:
      - apparmor=unconfined
    depends_on:
      lnbits:
        condition: service_healthy
    volumes:
      - lnbits-data:/lnbits-data
      - ./scripts/lnbits-init.py:/init.py:ro
    environment:
      LNBITS_URL: http://lnbits:5000
    command: ["python3", "/init.py"]

  # -----------------------------------------------------------------------------
  # Espresso app — FastAPI/HTMX touchscreen UI + admin + REST API.
  # -----------------------------------------------------------------------------
  espresso-app:
    image: ghcr.io/imcmurray/espresso-club/app:${ESPRESSO_TAG:-latest}
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: espresso-app
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
    depends_on:
      lnbits:
        condition: service_healthy
      lnbits-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      LNBITS_URL: http://lnbits:5000
      LNBITS_ADMIN_KEY: ${LNBITS_ADMIN_KEY:-}
      RELAY_DRIVER: ${RELAY_DRIVER:-simulator}
      SHELLY_HOST: ${SHELLY_HOST:-}
      GRINDER_PULSE_SECONDS: ${GRINDER_PULSE_SECONDS:-30}
      DRINKS_CONFIG: /app/drinks.yaml
      DATABASE_PATH: /data/espresso.sqlite3
    volumes:
      - espresso-data:/data
      - ./app/drinks.yaml:/app/drinks.yaml:ro
      - lnbits-data:/lnbits-data:ro

  # -----------------------------------------------------------------------------
  # NFC daemon — bridges PN532 reader (or simulator) to the espresso app.
  # -----------------------------------------------------------------------------
  nfc-daemon:
    image: ghcr.io/imcmurray/espresso-club/nfc:${ESPRESSO_TAG:-latest}
    build:
      context: .
      dockerfile: nfc_daemon/Dockerfile
    container_name: espresso-nfc
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
    depends_on:
      espresso-app:
        condition: service_healthy
    ports:
      - "9999:9999"
    environment:
      ESPRESSO_APP_URL: http://espresso-app:8080
      TAP_SIMULATOR: ${TAP_SIMULATOR:-true}
      NFC_DEVICE: ${NFC_DEVICE:-usb}
    devices: []

  # -----------------------------------------------------------------------------
  # Slack bot — onboarding + low-balance DMs + leaderboard. Only starts if
  # SLACK_BOT_TOKEN is provided AND --profile slack is passed.
  # -----------------------------------------------------------------------------
  slack-bot:
    image: ghcr.io/imcmurray/espresso-club/slack:${ESPRESSO_TAG:-latest}
    build:
      context: .
      dockerfile: slack_bot/Dockerfile
    container_name: espresso-slack-bot
    restart: unless-stopped
    profiles: ["slack"]
    security_opt:
      - apparmor=unconfined
    depends_on:
      espresso-app:
        condition: service_healthy
    environment:
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      ESPRESSO_APP_URL: http://espresso-app:8080
      LOW_BALANCE_THRESHOLD_USD: "2.00"

volumes:
  lnbits-data:
  phoenixd-data:
  espresso-data:
