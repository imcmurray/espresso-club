# Espresso Club — Dockge stack
#
# Self-contained compose file for use with Dockge (https://github.com/louislam/dockge).
# Defaults give you a fully-self-custodial Lightning espresso club in one paste:
# Phoenixd holds real BTC, LNbits manages per-staff sub-wallets, the espresso
# app coordinates onboarding/topups/drinks/gifts, and the NFC daemon bridges
# the PN532 reader (with a simulator fallback for hardware-free dev).
#
# To deploy:
#   1. In Dockge: New Stack → name it "espresso-club" → paste this file.
#   2. (Optional) Switch to the Env tab to override defaults
#      (e.g. ESPRESSO_TAG=<git-sha> to pin a specific build, RELAY_DRIVER=shelly).
#   3. Hit Deploy. Dockge runs `docker compose pull` then `up -d`.
#   4. **CRITICAL** — On first boot, capture Phoenixd's 12-word seed phrase
#      from the espresso-phoenixd container logs. It is shown ONCE and there
#      is no way to recover funds if the volume is destroyed without the seed.
#      See docs/lightning-testing.md.
#
# Reach the UI at http://<dockge-host>:8080/menu after a minute or so.

services:
  # -------------------------------------------------------------------------
  # Phoenixd — ACINQ's headless Lightning daemon. Self-custodial, automatic
  # channel management via ACINQ's LSP (no Bitcoin Core needed). Real BTC
  # lives here.
  #
  # On first boot it generates a 12-word seed and prints it to logs ONCE.
  # WRITE IT DOWN. The seed is the only thing whose loss is permanent —
  # everything else can be rebuilt from it.
  #
  # The HTTP API password is auto-generated and stored in
  # /phoenix/.phoenix/phoenix.conf. The lnbits service mounts that volume
  # read-only and reads the password at startup, so the operator never has
  # to copy/paste credentials.
  # -------------------------------------------------------------------------
  phoenixd:
    image: acinq/phoenixd:0.7.3
    container_name: espresso-phoenixd
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
    ports:
      - "127.0.0.1:9740:9740"   # localhost-only — only LNbits should reach this
    volumes:
      - phoenixd-data:/phoenix/.phoenix
    healthcheck:
      # Phoenixd is "ready" when phoenix.conf has been generated. After that,
      # the HTTP API is reachable too.
      test: ["CMD-SHELL", "test -f /phoenix/.phoenix/phoenix.conf"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 30s

  # -------------------------------------------------------------------------
  # LNbits — multi-user Lightning wallet system. Each staff member gets a
  # sub-wallet. Uses Phoenixd as its funding source so internal transfers
  # (drinks, gifts) stay free and only outbound/inbound to the wider Lightning
  # Network pays Phoenixd's small fees.
  #
  # Pinned to v1.5.4 (the official lnbits/lnbits image) — the lnbitsdocker
  # legacy images stop at 0.11 and don't have PhoenixdWallet support.
  #
  # The command override on first boot:
  #  1) generates a SUPER_USER UUID into /data/.super_user (idempotent).
  #  2) reads the Phoenixd HTTP password from the read-only mount of
  #     phoenixd-data and exports it as PHOENIXD_API_PASSWORD.
  #  3) starts LNbits with PhoenixdWallet as the funding source.
  # -------------------------------------------------------------------------
  lnbits:
    image: lnbits/lnbits:v1.5.4
    container_name: espresso-lnbits
    restart: unless-stopped
    depends_on:
      phoenixd:
        condition: service_healthy
    security_opt:
      - apparmor=unconfined
    ports:
      - "5000:5000"
    environment:
      LNBITS_HOST: 0.0.0.0
      LNBITS_PORT: 5000
      LNBITS_DATA_FOLDER: /data
      LNBITS_ADMIN_UI: "true"
      LNBITS_SITE_TITLE: "Espresso Club"
      LNBITS_SITE_TAGLINE: "fair coffee, fast settlement"
      LNBITS_BACKEND_WALLET_CLASS: PhoenixdWallet
      PHOENIXD_API_ENDPOINT: http://phoenixd:9740/
      # Allow login cookies over plain HTTP. Default is True (HTTPS-only),
      # which silently breaks the web UI login on LAN deploys: the browser
      # accepts the Set-Cookie response but won't persist a Secure cookie
      # without HTTPS, so every subsequent request comes back unauthenticated.
      # Flip to "true" if you put this stack behind an HTTPS reverse proxy.
      # NB: auth settings don't use the LNBITS_ prefix — env name is just
      # AUTH_HTTPS_ONLY.
      AUTH_HTTPS_ONLY: "false"
    volumes:
      - lnbits-data:/data
      # Read-only mount so the lnbits boot script can read Phoenixd's
      # auto-generated HTTP password from phoenix.conf without anyone
      # copying it by hand.
      - phoenixd-data:/phoenixd-data:ro
    command:
      - sh
      - -c
      - |
        set -eu
        # 1. Super-user bootstrap. LNbits reads SUPER_USER (env) to mark a
        #    user as full admin. We persist the UUID in /data/.super_user so
        #    container restarts use the same one and so the espresso-app's
        #    auto-bootstrap can find it.
        if [ ! -f /data/.super_user ]; then
          cat /proc/sys/kernel/random/uuid | tr -d - > /data/.super_user
          echo "[lnbits-bootstrap] generated SUPER_USER: $$(cat /data/.super_user)"
        fi
        export SUPER_USER="$$(cat /data/.super_user)"
        # 2. Phoenixd password discovery. The phoenixd container writes its
        #    auto-generated HTTP API password to phoenix.conf in its data
        #    volume. Wait up to 60s in case phoenixd is slow to first-boot.
        for i in $$(seq 1 60); do
          [ -f /phoenixd-data/phoenix.conf ] && break
          echo "[lnbits-bootstrap] waiting for phoenix.conf... ($$i/60)"
          sleep 1
        done
        if [ ! -f /phoenixd-data/phoenix.conf ]; then
          echo "[lnbits-bootstrap] FATAL: /phoenixd-data/phoenix.conf missing after 60s"
          exit 1
        fi
        export PHOENIXD_API_PASSWORD="$$(grep '^http-password=' /phoenixd-data/phoenix.conf | cut -d= -f2)"
        if [ -z "$$PHOENIXD_API_PASSWORD" ]; then
          echo "[lnbits-bootstrap] FATAL: couldn't extract http-password from phoenix.conf"
          exit 1
        fi
        echo "[lnbits-bootstrap] discovered Phoenixd API password (len=$${#PHOENIXD_API_PASSWORD})"
        # 3. Start LNbits. v1.5.4 uses `uv`, not `poetry`.
        exec uv --offline run lnbits --port "$${LNBITS_PORT:-5000}" --host "$${LNBITS_HOST:-0.0.0.0}" --forwarded-allow-ips='*'
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/api/v1/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # -------------------------------------------------------------------------
  # LNbits init — one-shot bootstrap that runs after lnbits is healthy:
  #   1. Completes the first-install wizard via API (idempotent).
  #   2. Saves admin credentials to /lnbits-data/admin.json (mode 600).
  #   3. Installs the User Manager extension (required for onboarding).
  # On subsequent boots: detects already-done state and exits cleanly.
  # The bootstrap script is fetched from GitHub at runtime so this stack
  # stays a single-paste compose file.
  # -------------------------------------------------------------------------
  lnbits-init:
    image: python:3.12-slim
    container_name: espresso-lnbits-init
    restart: "no"
    security_opt:
      - apparmor=unconfined
    depends_on:
      lnbits:
        condition: service_healthy
    volumes:
      - lnbits-data:/lnbits-data
    environment:
      LNBITS_URL: http://lnbits:5000
      INIT_SCRIPT_URL: "https://raw.githubusercontent.com/imcmurray/espresso-club/main/scripts/lnbits-init.py"
    command:
      - sh
      - -c
      - "python3 -c 'import urllib.request, os; open(\"/tmp/init.py\",\"wb\").write(urllib.request.urlopen(os.environ[\"INIT_SCRIPT_URL\"]).read())' && python3 /tmp/init.py"

  # -------------------------------------------------------------------------
  # Espresso app — FastAPI/HTMX touchscreen UI + admin + REST API.
  # -------------------------------------------------------------------------
  espresso-app:
    image: ghcr.io/imcmurray/espresso-club/app:${ESPRESSO_TAG:-latest}
    container_name: espresso-app
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
    depends_on:
      lnbits:
        condition: service_healthy
      lnbits-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      LNBITS_URL: http://lnbits:5000
      LNBITS_ADMIN_KEY: ${LNBITS_ADMIN_KEY:-}
      RELAY_DRIVER: ${RELAY_DRIVER:-simulator}
      SHELLY_HOST: ${SHELLY_HOST:-}
      GRINDER_PULSE_SECONDS: ${GRINDER_PULSE_SECONDS:-30}
      DRINKS_CONFIG: /app/drinks.yaml
      DATABASE_PATH: /data/espresso.sqlite3
    volumes:
      - espresso-data:/data
      # Read-only mount of LNbits' data volume so the app can auto-discover
      # the LNbits super-user's admin API key on first boot. Without this,
      # /onboard fails with 401 unless the operator manually sets
      # LNBITS_ADMIN_KEY env after fishing the key out of LNbits' UI.
      - lnbits-data:/lnbits-data:ro
      # Read-only mount of Phoenixd's data volume so /admin/node can
      # auto-discover Phoenixd's HTTP API password from phoenix.conf.
      - phoenixd-data:/phoenixd-data:ro

  # -------------------------------------------------------------------------
  # NFC daemon — bridges PN532 reader (or simulator) to the espresso app.
  # Default = simulator, listens on :9999/tap so you can fake taps without
  # hardware. Flip TAP_SIMULATOR=false once a real PN532 is plugged in.
  # -------------------------------------------------------------------------
  nfc-daemon:
    image: ghcr.io/imcmurray/espresso-club/nfc:${ESPRESSO_TAG:-latest}
    container_name: espresso-nfc
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
    depends_on:
      - espresso-app
    ports:
      - "9999:9999"   # simulator endpoint
    environment:
      ESPRESSO_APP_URL: http://espresso-app:8080
      TAP_SIMULATOR: ${TAP_SIMULATOR:-true}
      NFC_DEVICE: ${NFC_DEVICE:-usb}

  # -------------------------------------------------------------------------
  # Slack bot — uncomment + supply tokens to enable /espresso commands and
  # daily low-balance pings.
  # -------------------------------------------------------------------------
  # slack-bot:
  #   image: ghcr.io/imcmurray/espresso-club/slack:${ESPRESSO_TAG:-latest}
  #   container_name: espresso-slack-bot
  #   restart: unless-stopped
  #   security_opt:
  #     - apparmor=unconfined
  #   depends_on:
  #     - espresso-app
  #   environment:
  #     SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
  #     SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
  #     ESPRESSO_APP_URL: http://espresso-app:8080
  #     LOW_BALANCE_THRESHOLD_USD: "2.00"

volumes:
  phoenixd-data:
  lnbits-data:
  espresso-data:
