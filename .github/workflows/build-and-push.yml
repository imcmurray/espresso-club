# Build the three component images and push to GHCR.
#
# Why this exists: the project's reference deployment is a Proxmox-style LXC
# whose AppArmor namespace blocks Docker's build-time profile loader (see
# README.md "Known issues"). Building in CI and pulling on the LXC sidesteps
# the entire problem — the LXC only ever runs containers, never builds them.
#
# Multi-arch: amd64 for x86 LXCs and dev laptops, arm64 for the Raspberry Pi
# deployment described in docs/hardware.md.
#
# Cache: GitHub Actions cache (type=gha) is scoped per image so e.g. a change
# to nfc_daemon/ doesn't invalidate the app or slack-bot caches.
#
# Security note: this workflow only references trusted inputs
# (secrets.GITHUB_TOKEN, github.repository, github.sha, matrix values).
# None come from PR/issue/commit-message text, so there's no injection
# surface in any run: step.

name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'nfc_daemon/**'
      - 'slack_bot/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            dockerfile: app/Dockerfile
          - name: nfc
            dockerfile: nfc_daemon/Dockerfile
          - name: slack
            dockerfile: slack_bot/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.name }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
